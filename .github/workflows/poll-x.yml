name: Poll X list
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger cron endpoint
        run: |
          curl -sf -X GET \
            -H "x-vercel-cron: 1" \
            --max-time 120 \
            "${{ secrets.ENGAGEMENT_CRON_URL }}" \
            || echo "cron call failed (non-fatal)"
